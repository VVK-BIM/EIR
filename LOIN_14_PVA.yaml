      memo: Elementai, nenumatyti kitose projekto dalyse
      stages:
        s1: 
          lod: 300
          properties:
            <<: [*prop, *prop_g]
        s2: 
          lod: 200
          properties:
            <<: *prop
            <<: *prop_material
        s3: 
          lod: 300
          properties:
            <<: [*prop, *prop_g, *prop_material]
