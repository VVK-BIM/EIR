    - id: Priešgaisrinė sklendė                #    NSIK+ISO J.HF.FMA
      classifications:
        NSIK LF: J
        NSIK LT: HF
        NSIK LK: FMA
        ISO81346 CF: J
        ISO81346 CT: HF
        ISO81346 CC: FMA
      stages:
        s3:
          lod: 300
          log: 2
          properties:
           <<: *prop
           <<: *prop_material
           <<: *prop_g_wh
           <<: *prop_g_d
           <<: *prop_p_fr
        s4:
          lod: 350
          log: 2
          properties:
           <<: *prop
           <<: *prop_material
           <<: *prop_g_wh
           <<: *prop_g_d
           <<: *prop_p_fr

    - id: Priešgaisrinė ir dūmų sklendė        #    NSIK+ISO J.HF.FMC
