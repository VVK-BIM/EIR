prop:     &prop
  VVK.Name: {}
  VVK.ElementType: {}
  VVK.RelatedDrawing: {}
  Pset_ConstructionAdministration.SpecificationSectionNumber: {}
  Pset_ElementComponentCommon.Status: {}

prop_u:     &prop_u
  <<: *prop
  VVK.Tag: {}

prop_g:   &prop_g_l
  Pset_QuantityTakeOff.Length:
    valueType: Integer | Real

prop_g:   &prop_g_h
  Pset_QuantityTakeOff.Height:
    valueType: Integer | Real

prop_g:   &prop_g_w
  Pset_QuantityTakeOff.Width:
    valueType: Integer | Real

prop_g_area:   &prop_g_a
  Pset_QuantityTakeOff.Area:
    valueType: Integer | Real

prop_g_tav:   &prop_g_t
  Pset_QuantityTakeOff.Thickness:
    valueType: Integer | Real

prop_g_tav:   &prop_g_v
  Pset_QuantityTakeOff.Volume:
    valueType: Integer | Real


prop_g:   &prop_g
  <<: *prop_g_l
  <<: *prop_g_h
  <<: *prop_g_w

prop_g_area:   &prop_g_area
  <<: *prop_g_a
 
prop_g_lh:   &prop_g_lh
  <<: *prop_g_l
  <<: *prop_g_h


prop_g:   &prop_g_lwa
  <<: *prop_g_l
  <<: *prop_g_w
  <<: *prop_g_a
    
prop_g_tav:   &prop_g_tav
  <<: *prop_g_t
  <<: *prop_g_a
  <<: *prop_g_v
  

prop_vis:     &prop_vis
  VVK.Material: {}
  VVK.Finish: {}
  VVK.Colour: {}

prop_env:    &prop_env
  Pset_ServiceLifeFactors.OutdoorEnvironment:
    - examples:
      - XC1
    - units: Tekstas
    - descr: XO, XC1  Aplinkos agresyvumo klasė
    
prop_element_s3:     &prop_element_s3
  Pset_ServiceLifeFactors.OutdoorEnvironment:
    - examples:
      - XC1
    - units: Tekstas
    - descr: XO, XC1  Aplinkos agresyvumo klasė
  Pset_ElementComponentCommon.IsExternal: {}
  Pset_ElementComponentCommon.ThermalConductivity: {}
  

prop_electrical_s3: &prop_e
  Pset_ElectricalDeviceCommon.NominalPowerConsumption: {}
  Pset_ElectricalDeviceCommon.NominalVoltage: {}
  Pset_ElectricalDeviceCommon.NominalCurrent: {}



