# v 0.5a
# NSIK ver 0.9, 2023-09-01
# https://nsiklab.lt 


prop_g:   &prop_g_l
  Pset_QuantityTakeOff.Length: 
    valueType: Integer | Real 

prop_g:   &prop_g_w
  Pset_QuantityTakeOff.Width: 
    valueType: Integer | Real 

prop_g:   &prop_g_h
  Pset_QuantityTakeOff.Height: 
    valueType: Integer | Real 

prop_g_d:   &prop_g_d
  Pset_QuantityTakeOff.Diameter: 
    valueType: Integer | Real 
    
prop_g_lw:  &prop_g_lw
  <<: [*prop_g_l, *prop_g_w]

prop_g_ld:  &prop_g_ld
  <<: [*prop_g_l, *prop_g_d]

prop_g_wh:  &prop_g_wh
  <<: [*prop_g_h, *prop_g_w]
  
prop_g_a:       &prop_g_a
  Pset_QuantityTakeOff.Area: 
    valueType: Integer | Real 
  
prop_g:     &prop_g
  <<: [*prop_g_l, *prop_g_w, *prop_g_h]

prop_thick:     &prop_g_thickness
  <<: *prop_g_l
  Pset_QuantityTakeOff.Thickness:
    valueType: Integer | Real

prop_g_a:       &prop_g_area
  <<: *prop_g
  <<: *prop_g_a
  
prop_g_cable:   &prop_g_cable
  <<: *prop_g_l
  <<: *prop_g_d

prop:       &prop
  VVK.Name: {}
  VVK.ElementType: {}
  Pset_ConstructionAdministration.SpecificationSectionNumber: {}
  Pset_ElementCommon.System: {}
  Pset_ElementComponentCommon.Status: {}
  
prop_u:     &prop_u
  <<: *prop
  VVK.Tag: {}

prop_mat:   &prop_material
  VVK.Material: {}
  
prop_vis:   &prop_vis
  VVK.Material: {}
  VVK.Finish: {}
  VVK.Colour: {}


prop_e:     &prop_e
  Pset_ElectricalDeviceCommon.NominalPowerConsumption: 
    valueType: Integer | Real 
  Pset_ElectricalDeviceCommon.RatedVoltage: 
    valueType: Integer
  Pset_ElectricalDeviceCommon.HasProtectiveEarth: {}

prop_e:     &prop_h_e
  Pset_ElementComponentCommon.PowerConsumption: 
    valueType: Integer | Real 
  Pset_ElementComponentCommon.NominalPowerConsumption: 
    valueType: Integer | Real 

prop_p:     &prop_p_w
  Pset_ElementComponentCommon.Weight:
    valueType: Integer | Real 
    
prop_p:     &prop_p_fr
  Pset_ElementComponentCommon.FireRating: {}



ŠVOK.OK:
    elements:
    
      
    - id: Vamzdis    #H.HC.WPA
      classifications:
        NSIK LF: H
        NSIK LT: HC
        NSIK LK: WPA
        ISO81346 CF: H
        ISO81346 CT: HC
        ISO81346 CC: WPA
      stages:
        s1:
          properties:
            <<: *prop
            <<: *prop_g_l
            <<: *prop_g_d
            <<: *prop_material
        s3:
          properties:
            <<: *prop
            <<: *prop_g_l
            <<: *prop_g_d
            <<: *prop_material
        s4:
          properties:
            <<: *prop
            <<: *prop_g_l
            <<: *prop_g_d
            <<: *prop_material


      
    - id: Šalto oro pūstuvas                          # NSIK+ISO: H.HC.ECB
      classifications:
