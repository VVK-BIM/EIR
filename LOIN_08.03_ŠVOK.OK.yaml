        NSIK LT: HC
        NSIK LK: ECB
        ISO81346 CF: H
        ISO81346 CT: HC
        ISO81346 CC: ECB
      stages: &device_electrical
        s3:
          lod: 300
          log: 2
          properties:
           <<: *prop
           <<: *prop_vis
           <<: *prop_g
           <<: *prop_e
        s4:
          lod: 350
          log: 3
          properties:
           <<: *prop_u
           <<: *prop_vis
           <<: *prop_g
           <<: *prop_e
      
