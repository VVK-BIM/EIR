        s1:
          properties: 
            <<: *prop
            <<: *prop_g_tav
            <<: *prop_vis
            <<: *prop_u
            <<: *prop_loads_s4
        s2:
          properties: 
            <<: *prop
            <<: *prop_g_tav
            <<: *prop_vis
        s3: 
          properties:
            <<: *prop
            <<: *prop_g_tav
            <<: *prop_vis
        s4:
