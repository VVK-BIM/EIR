SA:
    id: "03"
    name: Statinio architektūra
    stages:
      s1:
        lod: 275
        log: 2
      s2:
        lod: 200
        log: 2
      s3:
        lod: 300
        log: 2
      s4:
        lod: 350
        log: 2
