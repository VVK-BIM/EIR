        NSIK LF: H
        NSIK LT: HD
        NSIK LK: BHB
        ISO81346 CF: H
        ISO81346 CT: HD
        ISO81346 CC: BHB
      stages: &stages_sensor_electrical
        s3:
          lod: 300
          log: 2
          properties:
           <<: *prop
           <<: *prop_g
           <<: *prop_g_d
           <<: *prop_e
           <<: *prop_material
        s4:
          lod: 350
          log: 3
