      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: RND
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: RND
      ifcType: *type_flow
      stages:  
        <<: *stages_s1_s3_s4_valve 
        
    - id: Vandens tiekimo sistemos vožtuvas              # NSIK+ISO: F.JB.QNA
      examples:
      - Ventilis
      - Sklendė
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: QNA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: QNA
      ifcType: *type_flow
      stages:  
        <<: *stages_s1_s3_s4_valve

    - id: Vandens tiekimo sistemos vožtuvas              # NSIK+ISO: F.JB.QMA
      examples:
