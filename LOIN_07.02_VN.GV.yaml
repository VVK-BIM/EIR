# elements
VN.GV:
    id: "07.01"
    name: Vandentiekis
    stages:
      s1:
        lod: 275
        log: 2
      s2:
        lod: 200
        log: 2
      s3:
        lod: 300
        log: 2
      s4:
        lod: 350
        log: 2
        properties:
          Pset_ManufacturerTypeInformation.ArticleNumber: {}
          Pset_ManufacturerTypeInformation.Manufacturer: {}
      s5:
        lod: 350
        log: 2
        properties:
        - VVK.RelatedDocumentationURI
      s6:
        lod: 500
        log: 6
        
    elements:

# vandentiekis, bendras atvejis
# vandens tiekimo sustema

    - id: Geriamo vandens skaitiklis                        # NSIK+ISO: F.JB.BHA
      examples:
      - Karšto vandens skaitiklis
      - vandens apskaitos prietaisas
      - Šalto vandens skaitiklis
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: BHA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: BHA
      stages:
        s1:
          properties:
            <<: *prop_u
            <<: *prop_g_diam
            <<: *prop_vis
        s3:
          properties:
            <<: *prop_u
            <<: *prop_vis
            <<: *prop_g_diam
        s4:
          properties:
            <<: *prop_u
            <<: *prop_vis
            <<: *prop_g_diam
    
    - id: Geriamojo vandens talpa                           # NSIK+ISO: F.JB.CMA
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: CMA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: CMA
      ifcType: *type_well
      stages:
        s1:
          properties:
            <<: *prop_u
            <<: *prop_g
            <<: *prop_vis
            <<: *prop_g_well
            Pset_QuantityTakeOff.Volume:
              valueType: Integer | Real
        s3:
          properties:
            <<: *prop
            <<: *prop_g
            <<: *prop_vis
            Pset_QuantityTakeOff.Volume:
              valueType: Integer | Real
        s4:
          properties:
            <<: *prop_u
            <<: *prop_g
            <<: *prop_vis
            <<: *prop_g_well
            Pset_QuantityTakeOff.Volume:
              valueType: Integer | Real
    
    - id: Geriamojo vandens šildytuvas                      # NSIK+ISO: F.JB.CPA
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: CPA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: CPA
      ifcType: *type_well
      stages:
        s1:
          properties:
            <<: *prop_u
            <<: *prop_g
            <<: *prop_vis
            <<: *prop_well
            <<: *prop_mass
        s3:
          properties:
            <<: *prop_g
            <<: *prop_vis
            <<: *prop_e
            
        s4:
          properties:
            <<: *prop_u
            <<: *prop_vis
            <<: *prop_well
            <<: *prop_mass
            <<: *prop_e
    
    - id: Vandentiekio sistemos teigiamo slėgio siurblys    # NSIK+ISO: F.JB.GPA
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: GPA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: GPA
      ifcType: *type_e
      stages:
        s2:
          lod: 200
          properties:
            <<: *prop
        s3: 
          log: 2
          lod: 300
          properties:
            <<: *prop
            <<: *prop_u
            <<: *prop_g
            <<: *prop_e
            Pset_QuantityTakeOff.Diameter: 
              descr: Prijungimo diametras
            <<: *prop_e_device
            <<: *prop_material
            <<: *prop_external
            
            
    - id: Vandens tiekimo sistemos izoliacija               # NSIK+ISO: F.JB.RQA         Uc: Pr_25_57_06
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: RQA
        Uniclass: Pr_25_57_06
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: RQA
      ifcType: *type_covering
      stages: &stages_s1_s4_insulation
        s1:
          properties:
            <<: *prop
            <<: *prop_g_thickness
            <<: *prop_material
            <<: *prop_external
        s3: 
          properties:
            <<: *prop
            <<: *prop_g_thickness
            <<: *prop_material
            <<: *prop_external
        s4: 
          properties:
            <<: *prop
            <<: *prop_g_thickness
            <<: *prop_material
            <<: *prop_external


    - id: Vandens tiekimo sistemos atbulinis vožtuvas    # NSIK+ISO: F.JB.RMA
      examples:
      - Ventilis
      - Sklendė
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: RMA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: RMA
      ifcType: *type_flow
      stages:  &stages_s1_s3_s4_valve
        s1:
          properties:
            <<: *prop_u
            <<: *prop_g_valve
            <<: *prop_material
            <<: *prop_external
        s3:
          properties:
            <<: *prop
            <<: *prop_g_valve
            <<: *prop_material
        s4: 
          properties:
            <<: *prop_u
            <<: *prop_g_valve
            <<: *prop_material
            <<: *prop_external

    - id: Vandens tiekimo sistemos sklendė               # NSIK+ISO: F.JB.RNA
      examples:
      - Ventilis
      - Sklendė
      classifications:
        NSIK LF: F
        NSIK LT: JB
        NSIK LK: RNA
        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: RNA
      ifcType: *type_flow
      stages:  
        <<: *stages_s1_s3_s4_valve 

    - id: Gaisrinis čiaupas                              # NSIK+ISO: F.JB.RND
      examples:
      - Ventilis
