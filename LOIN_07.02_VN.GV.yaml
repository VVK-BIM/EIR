        ISO81346 CF: F
        ISO81346 CT: JB
        ISO81346 CC: XMC
      ifcType: *type_well
      stages: &stages_s1_s3_s4_well
        s1:
          properties:
            <<: *prop_u
            <<: *prop_material
            <<: *prop_external
            <<: *prop_g_well
        s3:
          properties:
            <<: *prop_u
            <<: *prop_g_well
            <<: *prop_material
            
        s4: 
          properties:
            <<: *prop_u
            <<: *prop_g_well
